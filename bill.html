<h2>🧾 Monthly Bill</h2>

<h3>{{customer[0]}}</h3>

<table border="1" width="100%">
<tr><th>Date</th><th>Liters</th></tr>

{% for s in sales %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
</tr>
{% endfor %}
</table>

<h3>Total Liters: {{total_liters}}</h3>
<h3>Total Amount: ₹{{total_amount}}</h3>

<br>

<a href="{{whatsapp_url}}">
<button>📲 Send via WhatsApp</button>
</a>
