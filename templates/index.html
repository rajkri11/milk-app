<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; padding: 10px; background: #f5f5f5; }
.card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
button, .btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: green;
    color: white;
    text-align: center;
    border: none;
    border-radius: 8px;
    text-decoration: none;
}
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}
</style>
</head>

<body>

<h2>🥛 Milk Sales</h2>

<div class="card">
<a href="/add_customer" class="btn">➕ Add Customer</a>
</div>

<div class="card">
<form method="POST" action="/add_sale">
<select name="customer_id">
{% for c in customers %}
<option value="{{c[0]}}">{{c[1]}}</option>
{% endfor %}
</select>

<input type="number" step="0.1" name="liters" placeholder="Liters">
<button type="submit">Save Entry</button>
</form>
</div>

{% for c in customers %}
<div class="card">
<b>{{c[1]}}</b><br>
₹{{c[2]}}/L
<a href="/bill/{{c[0]}}" class="btn">View Bill</a>
</div>
{% endfor %}

</body>
</html>
